<!DOCTYPE html>
<html>
<head>
  <title>Inspection réseau</title>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    #map { height: 100vh; }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// 🔹 1. Initialisation carte
var map = L.map('map').setView([51.505, -0.09], 13);

// 🔹 2. Fond de carte (OpenStreetMap)
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
}).addTo(map);

// 🔹 variable pour stocker la couche
var geojsonLayer;

// 🔹 3. Style des tronçons
function getStyle(feature) {
  let val = feature.properties.SB_inspect;

  if (val == 1) {
    return { color: "yellow", weight: 4 };
  } else if (val == 2) {
    return { color: "red", weight: 4 };
  } else {
    return { color: "blue", weight: 2 };
  }
}

// 🔹 4. Reset style
function resetStyles() {
  geojsonLayer.resetStyle();
}

// 🔹 5. Highlight même inspection
function highlightInspection(inspec_ID) {
  geojsonLayer.eachLayer(function(layer) {
    if (layer.feature.properties.inspec_ID == inspec_ID) {
      layer.setStyle({
        weight: 6,
        color: "lime"
      });
    }
  });
}

// 🔹 6. Interaction
function onEachFeature(feature, layer) {

  layer.on('click', function() {

    resetStyles();

    let p = feature.properties;
    let id = p.inspec_ID;

    highlightInspection(id);

    // texte inspection
    let type = "Non inspecté";
    if (p.SB_inspect == 1) type = "Inspection SBM";
    if (p.SB_inspect == 2) type = "Inspection SBM + SBC";

    let content = `
      <b>ID inspection :</b> ${id}<br>
      <b>Type :</b> ${type}<br>
    `;

    if (p.url) {
      content += `<a href="${p.url}" target="_blank">📁 Ouvrir dossier</a>`;
    }

    layer.bindPopup(content).openPopup();

  });
}

// 🔹 7. Charger GeoJSON


fetch("pipeline_UU.geojson")
  .then(res => {
    console.log("status:", res.status);
    return res.json();
  })
  .then(data => {
    console.log("geojson chargé:", data);
  })
  .catch(err => console.error("ERREUR:", err));
  
fetch("pipeline_UU.geojson")
  .then(res => res.json())
  .then(data => {

    geojsonLayer = L.geoJSON(data, {
      style: getStyle,
      onEachFeature: onEachFeature
    }).addTo(map);

    map.fitBounds(geojsonLayer.getBounds());

  });
</script>

</body>
</html>
